name: heypster_flutter_sdk
description: "heypster's Flutter SDK"
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_cache_manager: ^3.4.1
  visibility_detector: ^0.4.0+2
  http: ^1.4.0
  video_player: ^2.9.0
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  assets:
    - assets/icons/search_glyph.png
    - assets/icons/2.0x/search_glyph.png
    - assets/icons/3.0x/search_glyph.png
    - assets/icons/4.0x/search_glyph.png
    - assets/icons/emotion_glyph.png
    - assets/icons/2.0x/emotion_glyph.png
    - assets/icons/3.0x/emotion_glyph.png
    - assets/emotions/

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
